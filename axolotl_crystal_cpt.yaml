# Stage 1 — Continued Pre-Training on raw Crystal source.
#
# Teaches the model the token distribution of Crystal code (which names cluster
# with which `require`s, what the stdlib actually exports). SFT alone can't do
# this — SFT teaches "how to answer questions about Crystal", CPT teaches
# "Crystal exists." Output of this stage is the base for stage 2 (SFT).

base_model: Qwen/Qwen3-Coder-30B-A3B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: false

adapter: lora
bf16: true
tf32: true

# Use legacy merge: target_parameters (fused MoE experts) writes a non-empty
# rank_pattern into adapter_config.json, which the memory-efficient merger
# misidentifies as AdaLoRA. Legacy uses peft's merge_and_unload() directly.
merge_method: legacy

datasets:
  - path: /workspace/data/cpt.jsonl
    type: completion
    field: text

dataset_prepared_path: /workspace/cache/cpt
val_set_size: 0.02
output_dir: /workspace/output_cpt
dataset_processes: 16

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

# v2: r=64/α=128 (was 16/32)
lora_r: 64
lora_alpha: 128
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

# v2: lr=2e-5 (4× higher), epochs=2 (was 1) — CPT was undertraining
# v3 OOM fix: micro_batch 2→1, grad_accum 4→8 (same effective batch=8) to free ~2 GB activation memory
gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 2
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 2.0e-5
warmup_ratio: 0.05
weight_decay: 0.0

flash_attention: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

logging_steps: 10
saves_per_epoch: 1
save_total_limit: 1
evals_per_epoch: 2

special_tokens:
  pad_token: <|endoftext|>
