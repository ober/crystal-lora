# Stage 2 — Supervised Fine-Tuning on Q/A pairs.
#
# Starts from the CPT-merged checkpoint (base_model is rewritten by the
# pipeline orchestrator before training). Teaches the model to answer Crystal
# questions in the chat format. 2 epochs (down from 3) because CPT already
# absorbed the source distribution.

base_model: __PIPELINE_BASE__
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: false

adapter: lora
bf16: true
tf32: true

# Use legacy merge: lora_target_parameters (fused MoE experts) trips the
# memory-efficient merger's AdaLoRA false-positive. Legacy uses peft's
# merge_and_unload() directly.
merge_method: legacy

datasets:
  - path: /workspace/data/sft.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_field_role: role
    message_field_content: content

dataset_prepared_path: /workspace/cache/sft
val_set_size: 0.02
output_dir: /workspace/output_sft
dataset_processes: 16

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_target_parameters:
  - experts.gate_up_proj
  - experts.down_proj

gradient_accumulation_steps: 4
micro_batch_size: 2
num_epochs: 2
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 1.0e-4
warmup_ratio: 0.05
weight_decay: 0.0

train_on_inputs: false
group_by_length: false

flash_attention: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

logging_steps: 5
saves_per_epoch: 1
save_total_limit: 1
evals_per_epoch: 2

special_tokens:
  pad_token: <|endoftext|>
